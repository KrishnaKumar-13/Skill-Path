# ─────────────────────────────────────────────
# Skill Navigator — Spring Boot Configuration
# Connects to Supabase Cloud PostgreSQL
# ─────────────────────────────────────────────

spring.application.name=skillpath-backend

# ─── Server ───────────────────────────────────
server.port=8080

# ─── Supabase PostgreSQL Connection ───────────
# These are read from environment variables.
# Set them in your shell, or in a .env file handled by the OS.
# NEVER hard-code credentials here.
#
# How to get these values:
#   1. Go to supabase.com → your project
#   2. Settings → Database
#   3. Copy: Host, Database name, Port, User, Password
#
spring.datasource.url=${SUPABASE_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────
# IMPORTANT: Use "validate" or "none" in production
# "validate" checks your entities match DB schema WITHOUT changing anything
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# ─── Supabase JWT Secret (for verifying user tokens) ───
# Found in: supabase.com → Settings → API → JWT Secret
supabase.jwt.secret=${JWT_SECRET}

# ─── CORS ─────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:5175,https://skill-path-brown.vercel.app

# ─── Logging ──────────────────────────────────
logging.level.org.springframework.web=INFO
logging.level.com.skillpath=DEBUG
logging.level.org.hibernate.SQL=WARN

# ─── Google Gemini API Key ────────────────────
gemini.api.key=${GEMINI_API_KEY}
