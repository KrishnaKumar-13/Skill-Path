# ─────────────────────────────────────────────
# Skill Navigator — Spring Boot Configuration
# Example file with placeholders for sensitive data
# ─────────────────────────────────────────────

spring.application.name=skillpath-backend

# ─── Server ───────────────────────────────────
server.port=8080

# ─── Supabase PostgreSQL Connection ───────────
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# ─── Supabase JWT Secret (for verifying user tokens) ───
supabase.jwt.secret=

# ─── CORS ─────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:5175

# ─── Logging ──────────────────────────────────
logging.level.org.springframework.web=INFO
logging.level.com.skillpath=DEBUG
logging.level.org.hibernate.SQL=WARN

# ─── Google Gemini API Key ────────────────────
gemini.api.key=
